{% extends "layout.html" %}

{% block content %}
<!-- Activity Detail Header -->
<section class="bg-gray-900 text-white py-20">
    <div class="container mx-auto px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-serif font-bold mb-4 leading-tight">{{ activity.title }}</h1>
        <div class="text-gray-400 text-sm">
            โพสต์เมื่อ: {{ activity.created_at.strftime('%d %B %Y') }}
        </div>
    </div>
</section>

<!-- Content -->
<article class="bg-white py-16">
    <div class="container mx-auto px-4 max-w-5xl">

        <div class="prose prose-xl prose-green mx-auto mb-12 text-center text-gray-700">
            {{ activity.content | safe }}
        </div>

        {% if activity.image_url %}
        <div class="rounded-xl overflow-hidden shadow-xl mb-8">
            <img src="{{ activity.image_url }}" alt="{{ activity.title }}" class="w-full h-auto">
        </div>
        {% endif %}

        <div class="text-center mt-12">
            <a href="/activities"
                class="inline-block px-8 py-3 bg-gray-100 text-gray-800 font-bold rounded-full hover:bg-gray-200 transition">←
                กลับไปหน้ากิจกรรมรวม</a>
        </div>
    </div>
</article>
{% endblock %}
