{% extends "layout.html" %}

{% block content %}
<!-- News Detail Header -->
<section class="bg-green-900 text-white py-20 relative overflow-hidden">
    <div class="absolute inset-0 bg-black/30 z-0"></div>
    {% if news.image_url %}
    <div class="absolute inset-0 z-0 opacity-30 select-none pointer-events-none">
        <img src="{{ news.image_url }}" class="w-full h-full object-cover blur-sm">
    </div>
    {% endif %}

    <div class="container mx-auto px-4 relative z-10 text-center">
        <div class="inline-block bg-yellow-500 text-green-900 font-bold px-3 py-1 rounded-full text-sm mb-4">
            ข่าวประชาสัมพันธ์
        </div>
        <h1 class="text-3xl md:text-5xl font-serif font-bold mb-4 leading-tight max-w-4xl mx-auto">{{ news.title }}</h1>
        <div class="text-white/80 text-sm flex items-center justify-center gap-4">
            <span>📅 {{ news.created_at.strftime('%d %B %Y') }}</span>
        </div>
    </div>
</section>

<!-- Content -->
<article class="bg-white py-16">
    <div class="container mx-auto px-4 max-w-4xl">
        {% if news.image_url %}
        <div class="rounded-2xl overflow-hidden shadow-2xl mb-10 -mt-32 relative z-20">
            <img src="{{ news.image_url }}" alt="{{ news.title }}" class="w-full h-auto">
        </div>
        {% endif %}

        <div class="prose prose-lg prose-green mx-auto text-gray-700">
            {{ news.content | safe }}
        </div>

        <div class="mt-12 pt-8 border-t border-gray-200">
            <a href="/news" class="text-green-700 font-bold hover:underline">← กลับไปหน้าข่าวสารทั้งหมด</a>
        </div>
    </div>
</article>
{% endblock %}
