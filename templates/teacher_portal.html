{% extends "layout.html" %}

{% block content %}
<div class="bg-slate-900 text-white py-16">
    <div class="container mx-auto px-4 text-center header-content" data-aos="fade-up">
        <h1 class="text-4xl font-serif font-bold mb-4">Teacher Portal</h1>
        <p class="text-lg opacity-90">Upload your CV (Curriculum Vitae)</p>
    </div>
</div>

<div class="container mx-auto px-4 py-16 max-w-lg">
    <div class="portal-card bg-white rounded-xl shadow-lg p-8" data-aos="fade-up" data-aos-delay="200">
        <div class="space-y-4">
            <p class="text-gray-700">
                เพื่อความปลอดภัย ระบบอัปโหลด CV แบบไม่ต้องล็อกอินถูกยกเลิกแล้ว
            </p>
            <p class="text-gray-600 text-sm">
                กรุณาเข้าสู่ระบบที่หน้า Admin/Teacher Dashboard และใช้งานเมนู “แก้ไขข้อมูลส่วนตัว (CV)”
            </p>
            <a href="/admin/login"
               class="inline-flex w-full justify-center bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                ไปหน้าเข้าสู่ระบบ
            </a>
        </div>
    </div>
</div>
{% endblock %}
