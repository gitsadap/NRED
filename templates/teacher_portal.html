{% extends "layout.html" %}

{% block content %}
<div class="bg-slate-900 text-white py-16">
    <div class="container mx-auto px-4 text-center header-content" data-aos="fade-up">
        <h1 class="text-4xl font-serif font-bold mb-4">Teacher Portal</h1>
        <p class="text-lg opacity-90">Upload your CV (Curriculum Vitae)</p>
    </div>
</div>

<div class="container mx-auto px-4 py-16 max-w-lg">
    <div class="portal-card bg-white rounded-xl shadow-lg p-8" data-aos="fade-up" data-aos-delay="200">
        <form action="/api/faculty/upload-cv" method="post" enctype="multipart/form-data" class="space-y-6">

            <div>
                <label for="user_id" class="block text-sm font-medium text-gray-700 mb-2">Select Faculty Member</label>
                <select name="user_id" id="user_id" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="">-- Choose Name --</option>
                    {% for person in faculty %}
                    <option value="{{ person.id }}">{{ person.name }}</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-gray-500 mt-1">Select your name from the list.</p>
            </div>

            <div>
                <label for="file" class="block text-sm font-medium text-gray-700 mb-2">Upload CV (PDF)</label>
                <input type="file" name="file" id="file" accept=".pdf" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="text-xs text-gray-500 mt-1">Only PDF files are allowed.</p>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Upload CV
            </button>
        </form>
    </div>
</div>
{% endblock %}
